[broker]
url = "wss://<broker-app>.azurewebsites.net/ws/worker"
worker_id = "worker-home-pc"
auth_mode = "shared_secret" # local/dev: shared_secret; production: entra_id
worker_token = "<worker-shared-token>"
display_name = "Home PC"
reconnect_seconds = 5
heartbeat_seconds = 30

# Entra ID production auth. If entra_client_secret is empty, the worker uses
# DefaultAzureCredential, including managed identity on Azure hosts.
entra_tenant_id = "<tenant-id>"
entra_client_id = "" # optional managed identity or service principal client id
entra_client_secret = ""
entra_scope = "api://<broker-api-app-id>/.default"

[sessions]
state_dir = "C:\\ProgramData\\copilot-box\\state"
ttl_seconds = 86400
max_concurrent_requests = 1
single_active_session = true

[workdirs]
allowed = [
  "Q:\\gitroot\\copilot-box"
]

[agent]
adapter = "github_copilot_sdk"
# Empty means let Copilot choose the account/runtime default model.
model = ""
timeout_seconds = 120
approve_all_tool_requests = true
base_directory = "C:\\ProgramData\\copilot-box\\copilot-home"

[reports]
enabled = true
root_dir = "Q:\\copilot-box-reports"
max_file_bytes = 1048576
