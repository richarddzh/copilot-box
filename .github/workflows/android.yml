name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
      - "android-v*"
    paths:
      - ".github/workflows/android.yml"
      - "android/**"
  pull_request:
    paths:
      - ".github/workflows/android.yml"
      - "android/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle -p android assembleDebug

      - name: Rename APK
        run: |
          mkdir -p android-release
          cp android/app/build/outputs/apk/debug/app-debug.apk android-release/copilot-box-android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-box-android-debug
          path: android-release/copilot-box-android-debug.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-release/copilot-box-android-debug.apk
